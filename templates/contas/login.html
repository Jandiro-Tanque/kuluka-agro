{% extends 'base.html' %}
{% load static %}

{% block titulo %}Entrar - KULUKA AGRO{% endblock %}

{% block conteudo %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <img src="{% static 'images/logo.png' %}" alt="KULUKA AGRO" height="80">
                <h2 class="mt-3 fw-bold">Bem-vindo de volta!</h2>
                <p class="text-muted">Entre na sua conta para continuar</p>
            </div>
            
            <div class="form-glass">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person me-1"></i> Usuário
                        </label>
                        <input type="text" 
                               name="username" 
                               id="username" 
                               class="form-control" 
                               placeholder="Seu nome de usuário"
                               required
                               autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-1"></i> Senha
                        </label>
                        <input type="password" 
                               name="password" 
                               id="password" 
                               class="form-control" 
                               placeholder="Sua senha"
                               required>
                    </div>
                    
                    <button type="submit" class="btn btn-kuluka w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                    
                    <div class="text-center">
                        <p class="mb-0">
                            Não tem uma conta? 
                            <a href="{% url 'contas:registro' %}" class="text-success fw-bold">
                                Cadastre-se
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
