{% extends 'base.html' %}
{% load static %}

{% block titulo %}Excluir Produto - KULUKA AGRO{% endblock %}

{% block conteudo %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Excluir Produto?</h3>
                <p class="text-muted">
                    Tem certeza que deseja excluir o produto <strong>{{ object.nome }}</strong>?
                    Esta ação não pode ser desfeita.
                </p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i> Sim, Excluir
                        </button>
                        <a href="{% url 'produtos:meus_produtos' %}" class="btn btn-kuluka-outline">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
